<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vanpool Pass</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #123f73;
      color: white;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #123f73;
      text-align: center;
      overflow: hidden;
    }

    .hidden {
      display: none !important;
    }

    /* ---------- ENTRY SCREEN ---------- */

    .entry-screen {
      min-height: 100vh;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      background: #123f73;
    }

    .entry-screen h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
      font-weight: 900;
    }

    .entry-screen input {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      outline: none;
      text-align: center;
      font-size: 34px;
      font-weight: 900;
      color: #123f73;
    }

    .entry-screen button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: #5cff14;
      color: #123f73;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
    }

    /* ---------- PASS SCREEN ---------- */

    .pass-screen {
      min-height: 100vh;
      background: #102f70;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding-top: 108px;
      padding-left: 18px;
      padding-right: 18px;
      position: relative;
    }

    .qr-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .qr {
      width: 222px;
      height: 222px;
      background: white;
      padding: 18px;
      display: grid;
      grid-template-columns: repeat(29, 1fr);
      grid-template-rows: repeat(29, 1fr);
      gap: 1px;
    }

    .qr div.black {
      background: #000;
    }

    .qr div.white {
      background: #fff;
    }

    .qr-center {
      position: absolute;
      width: 52px;
      height: 52px;
      background: white;
      top: 193px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-center-inner-1 {
      width: 42px;
      height: 42px;
      border: 6px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-center-inner-2 {
      width: 24px;
      height: 24px;
      border: 5px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-center-inner-3 {
      width: 8px;
      height: 8px;
      background: black;
    }

    .code {
      margin-top: 39px;
      color: #5cff14;
      font-size: 56px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .fare {
      margin-top: 36px;
      font-size: 38px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .zone {
      margin-top: 34px;
      font-size: 39px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .route {
      margin-top: 28px;
      font-size: 27px;
      line-height: 1;
      font-weight: 900;
    }

    .trip {
      margin-top: 34px;
      font-size: 37px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.4px;
    }

    .price {
      margin-top: 31px;
      font-size: 29px;
      line-height: 1;
      font-weight: 900;
    }

    .timer-area {
      margin-top: 316px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .timer {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      border: 4px solid white;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 43px;
      font-weight: 300;
      line-height: 1;
      position: relative;
    }

    .timer::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 8px solid transparent;
      border-bottom-color: #5cff14;
      transform: rotate(18deg);
    }

    .change-button {
      margin-top: 34px;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    /* iPhone Safari height adjustment */
    @media (max-height: 820px) {
      .pass-screen {
        padding-top: 82px;
      }

      .qr {
        width: 205px;
        height: 205px;
        padding: 16px;
      }

      .qr-center {
        top: 157px;
      }

      .code {
        margin-top: 35px;
        font-size: 52px;
      }

      .fare {
        margin-top: 32px;
        font-size: 35px;
      }

      .zone {
        margin-top: 30px;
        font-size: 36px;
      }

      .route {
        margin-top: 24px;
        font-size: 25px;
      }

      .trip {
        margin-top: 30px;
        font-size: 34px;
      }

      .price {
        margin-top: 27px;
        font-size: 27px;
      }

      .timer-area {
        margin-top: 235px;
      }
    }

    @media (max-height: 740px) {
      .pass-screen {
        padding-top: 58px;
      }

      .qr {
        width: 180px;
        height: 180px;
        padding: 14px;
      }

      .qr-center {
        top: 126px;
        width: 44px;
        height: 44px;
      }

      .qr-center-inner-1 {
        width: 36px;
        height: 36px;
      }

      .qr-center-inner-2 {
        width: 20px;
        height: 20px;
      }

      .code {
        margin-top: 28px;
        font-size: 46px;
      }

      .fare {
        margin-top: 25px;
        font-size: 31px;
      }

      .zone {
        margin-top: 25px;
        font-size: 32px;
      }

      .route {
        margin-top: 19px;
        font-size: 22px;
      }

      .trip {
        margin-top: 25px;
        font-size: 30px;
      }

      .price {
        margin-top: 22px;
        font-size: 24px;
      }

      .timer-area {
        margin-top: 170px;
      }

      .timer {
        width: 70px;
        height: 70px;
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <main class="app">

    <section id="entryScreen" class="entry-screen">
      <h1>Enter Pass Code</h1>
      <input id="codeInput" type="text" placeholder="6866" inputmode="numeric" pattern="[0-9]*" />
      <button onclick="openPass()">Open Pass</button>
    </section>

    <section id="passScreen" class="pass-screen hidden">

      <div class="qr-wrap">
        <div id="qr" class="qr"></div>
      </div>

      <div class="qr-center">
        <div class="qr-center-inner-1">
          <div class="qr-center-inner-2">
            <div class="qr-center-inner-3"></div>
          </div>
        </div>
      </div>

      <div id="displayCode" class="code">6866</div>

      <div class="fare">FULL FARE</div>
      <div class="zone">Zone 9 - Zone 1</div>
      <div class="route">Spotsylvania - L Enfant</div>
      <div class="trip">TEN TRIP</div>
      <div class="price">$117.80</div>

      <div class="timer-area">
        <div id="timer" class="timer">4</div>
      </div>

      <button class="change-button" onclick="resetPass()">Change Code</button>

    </section>
  </main>

  <script>
    let seconds = 4;
    let timerStarted = false;

    function openPass() {
      const input = document.getElementById("codeInput");
      const enteredCode = input.value.replace(/\D/g, "").trim();

      if (enteredCode === "") {
        alert("Please enter a pass code.");
        return;
      }

      document.getElementById("displayCode").textContent = enteredCode;
      document.getElementById("entryScreen").classList.add("hidden");
      document.getElementById("passScreen").classList.remove("hidden");

      buildQr(enteredCode);
      startTimer();
    }

    function resetPass() {
      document.getElementById("passScreen").classList.add("hidden");
      document.getElementById("entryScreen").classList.remove("hidden");
      document.getElementById("codeInput").focus();
    }

    function qrCellIsBlack(x, y, seed) {
      const topLeft = x < 7 && y < 7;
      const topRight = x > 21 && y < 7;
      const bottomLeft = x < 7 && y > 21;

      const finder = topLeft || topRight || bottomLeft;

      if (finder) {
        const fx = x < 7 ? x : x - 22;
        const fy = y < 7 ? y : y - 22;

        return (
          fx === 0 ||
          fy === 0 ||
          fx === 6 ||
          fy === 6 ||
          (fx >= 2 && fx <= 4 && fy >= 2 && fy <= 4)
        );
      }

      const patternA = (x * 17 + y * 31 + seed) % 9;
      const patternB = (x * y + seed + x * 13) % 11;
      const patternC = (x * 5 + y * 7 + seed) % 6;

      return patternA < 4 || patternB < 3 || patternC === 0;
    }

    function buildQr(code) {
      const qr = document.getElementById("qr");
      qr.innerHTML = "";

      const seed = code
        .split("")
        .reduce((sum, char) => sum + char.charCodeAt(0), 0);

      for (let y = 0; y < 29; y++) {
        for (let x = 0; x < 29; x++) {
          const cell = document.createElement("div");
          cell.className = qrCellIsBlack(x, y, seed) ? "black" : "white";
          qr.appendChild(cell);
        }
      }
    }

    function startTimer() {
      if (timerStarted) return;

      timerStarted = true;

      setInterval(() => {
        seconds = seconds <= 0 ? 29 : seconds - 1;
        document.getElementById("timer").textContent = seconds;
      }, 1000);
    }

    document.getElementById("codeInput").addEventListener("input", function () {
      this.value = this.value.replace(/\D/g, "");
    });

    buildQr("6866");
  </script>
</body>
</html>
