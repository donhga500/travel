<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanpool Pass</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #06164a;
      color: white;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #06164a;
      padding: 8px 22px 30px;
      text-align: center;
    }

    .entry-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .entry-screen h1 {
      font-size: 28px;
      margin: 0;
    }

    .entry-screen input {
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      border: none;
      font-size: 28px;
      text-align: center;
      font-weight: 900;
    }

    .entry-screen button {
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: #7cff2f;
      color: #06164a;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
    }

    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 34px;
    }

    .qr-wrap {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .qr {
      width: 150px;
      height: 150px;
      background: white;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(21, 1fr);
      grid-template-rows: repeat(21, 1fr);
      gap: 1px;
    }

    .qr div.black { background: black; }
    .qr div.white { background: white; }

    .code {
      margin-top: 26px;
      color: #7cff2f;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .fare {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 900;
    }

    .zone {
      margin-top: 8px;
      font-size: 17px;
      font-weight: 900;
    }

    .route {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 800;
    }

    .trip {
      margin-top: 8px;
      font-size: 20px;
      font-weight: 900;
    }

    .price {
      margin-top: 7px;
      font-size: 14px;
      font-weight: 900;
    }

    .timer-area {
      margin-top: 210px;
      display: flex;
      justify-content: center;
    }

    .timer {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid #7cff2f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      position: relative;
      color: white;
    }

    .timer::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-right-color: white;
      transform: rotate(45deg);
    }

    .demo {
      margin-top: 24px;
      font-size: 11px;
      opacity: 0.45;
      letter-spacing: 1px;
    }

    .hidden { display: none; }
  </style>
</head>

<body>
  <main class="app">

    <section id="entryScreen" class="entry-screen">
      <h1>Enter Pass Code</h1>
      <input id="codeInput" type="number" placeholder="6866" inputmode="numeric" />
      <button onclick="openPass()">Open Pass</button>
    </section>

    <section id="passScreen" class="hidden">

      <div class="qr-wrap">
        <div id="qr" class="qr"></div>
      </div>

      <div id="displayCode" class="code">6866</div>

      <div class="fare">FULL FARE</div>
      <div class="zone">Zone 9 - Zone 1</div>
      <div class="route">Spotsylvania - L’Enfant</div>
      <div class="trip">TEN TRIP</div>
      <div class="price">$117.80</div>

      <div class="timer-area">
        <div id="timer" class="timer">4</div>
      </div>

      <div class="demo"></div>
    </section>
  </main>

  <script>
    let seconds = 4;

    function openPass() {
      const enteredCode = document.getElementById("codeInput").value.trim();

      if (enteredCode === "") {
        alert("Please enter a pass code.");
        return;
      }

      document.getElementById("displayCode").textContent = enteredCode;
      document.getElementById("entryScreen").classList.add("hidden");
      document.getElementById("passScreen").classList.remove("hidden");
    }

    
    function qrCellIsBlack(x, y) {
      const finder =
        (x < 7 && y < 7) ||
        (x > 13 && y < 7) ||
        (x < 7 && y > 13);

      if (finder) {
        const fx = x < 7 ? x : x - 14;
        const fy = y < 7 ? y : y - 14;

        return fx === 0 || fy === 0 || fx === 6 || fy === 6 ||
          (fx >= 2 && fx <= 4 && fy >= 2 && fy <= 4);
      }

      return ((x * 17 + y * 31 + x * y) % 7) < 3;
    }

    function buildQr() {
      const qr = document.getElementById("qr");
      qr.innerHTML = "";

      for (let y = 0; y < 21; y++) {
        for (let x = 0; x < 21; x++) {
          const cell = document.createElement("div");
          cell.className = qrCellIsBlack(x, y) ? "black" : "white";
          qr.appendChild(cell);
        }
      }
    }

    setInterval(() => {
      seconds = seconds <= 0 ? 29 : seconds - 1;
      document.getElementById("timer").textContent = seconds;
    }, 1000);


    buildQr();
  </script>
</body>
</html>
